# Seven-container gRPC architecture: Primary, Native, OPA, Ansible, Gitleaks, Cache maintainer.
# All validators implement the unified Validator gRPC service (validate.proto).
# CLI is run on-the-fly with CWD mounted (see containers/podman/run-cli.sh for Podman).
# Docker: docker compose build && docker compose up -d
# With UI: docker compose --profile ui build && docker compose --profile ui up -d
#          Scans via CLI only for now; web-initiated scans deferred.
# Scan:    docker compose run --rm -v "$(pwd)":/workspace -w /workspace cli apme-scan scan .

services:
  primary:
    build:
      context: .
      dockerfile: containers/primary/Dockerfile
    ports:
      - "50051:50051"
    environment:
      NATIVE_GRPC_ADDRESS: native:50055
      OPA_GRPC_ADDRESS: opa:50054
      ANSIBLE_GRPC_ADDRESS: ansible:50053
      GITLEAKS_GRPC_ADDRESS: gitleaks:50056
    depends_on:
      - native
      - opa
      - ansible
      - gitleaks

  native:
    build:
      context: .
      dockerfile: containers/native/Dockerfile
    ports:
      - "50055:50055"

  opa:
    build:
      context: .
      dockerfile: containers/opa/Dockerfile
    ports:
      - "50054:50054"

  ansible:
    build:
      context: .
      dockerfile: containers/ansible/Dockerfile
    volumes:
      - cache:/cache:ro
    ports:
      - "50053:50053"

  gitleaks:
    build:
      context: .
      dockerfile: containers/gitleaks/Dockerfile
    ports:
      - "50056:50056"

  cache-maintainer:
    build:
      context: .
      dockerfile: containers/cache-maintainer/Dockerfile
    volumes:
      - cache:/cache
    ports:
      - "50052:50052"

  # Web Gateway: FastAPI container outside the engine pod (ADR-029).
  # Translates HTTP/WebSocket to gRPC; owns SQLite persistence.
  # Start with: docker compose --profile ui up
  gateway:
    build:
      context: .
      dockerfile: containers/gateway/Dockerfile
    ports:
      - "${APME_GATEWAY_PORT:-8080}:8080"
    environment:
      APME_PRIMARY_ADDRESS: primary:50051
      APME_DATABASE_URL: "sqlite+aiosqlite:////data/apme.db"
    volumes:
      - gateway-data:/data
      - ${APME_WORKSPACE_PATH:-.}:/workspace:ro
    depends_on:
      - primary
    networks:
      default:
        aliases:
          - apme-gateway
    profiles:
      - ui

  # Standalone UI: React SPA served by nginx (ADR-030).
  # Proxies /api to gateway; talks only to the gateway, never the engine.
  # Start with: docker compose --profile ui up
  ui:
    build:
      context: .
      dockerfile: containers/ui/Dockerfile
    ports:
      - "${APME_UI_PORT:-8081}:8081"
    depends_on:
      - gateway
    profiles:
      - ui

  # CLI: run on-the-fly only (never 'up'). Example: docker compose run --rm -v "$(pwd)":/workspace -w /workspace cli
  cli:
    build:
      context: .
      dockerfile: containers/cli/Dockerfile
    environment:
      APME_PRIMARY_ADDRESS: primary:50051
    volumes:
      - ${APME_WORKSPACE:-.}:/workspace
    entrypoint: ["apme-scan", "scan"]
    command: ["."]
    profiles:
      - cli

volumes:
  cache:
  gateway-data:
