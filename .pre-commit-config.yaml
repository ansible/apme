repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.5
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.19.1
    hooks:
      - id: mypy
        args: [--strict, --exclude, "apme_gateway", src/apme_engine/, src/apme/, tests/, scripts/]
        pass_filenames: false
        additional_dependencies:
          - types-protobuf
          - types-PyYAML
          - grpc-stubs
  - repo: https://github.com/jsh9/pydoclint
    rev: 0.8.3
    hooks:
      - id: pydoclint
        args: [--exclude=src/apme/v1/|src/apme_gateway/|tests/gateway/, src/, tests/, scripts/]
        pass_filenames: false
  - repo: local
    hooks:
      - id: ui-lint
        name: ui-lint
        entry: scripts/ui-lint.sh
        language: script
        files: ^ui/.*\.(ts|tsx)$
        pass_filenames: false
